<!DOCTYPE html>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0c1520;
      --border:     rgba(255,255,255,0.07);
      --text:       #ede8df;
      --text-muted: rgba(237,232,223,0.75);
      --text-dim:   rgba(237,232,223,0.5);
      --amber:      #d2a864;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 70% 50% at 10% 0%, rgba(93,158,168,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 95% 100%, rgba(210,168,100,0.04) 0%, transparent 55%);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 24px 80px;
    }

    nav {
      width: 100%;
      max-width: 720px;
      padding: 36px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--amber);
      text-decoration: none;
    }

    .content {
      width: 100%;
      max-width: 720px;
      padding-top: 120px;
      text-align: center;
    }

    .four-oh-four {
      font-family: 'Cormorant Garamond', serif;
      font-size: 6rem;
      font-weight: 400;
      color: var(--text-dim);
      line-height: 1;
      margin-bottom: 32px;
      letter-spacing: -0.02em;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 16px;
    }

    p {
      font-size: 0.97rem;
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.7;
      max-width: 420px;
      margin: 0 auto 40px;
    }

    .btn {
      background: var(--amber);
      color: #0c1520;
      border: none;
      border-radius: 8px;
      padding: 13px 32px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }
  </style>

<body>

<nav>

  <a href="/" class="btn">Back to Cut Adrift</a>
</div>
